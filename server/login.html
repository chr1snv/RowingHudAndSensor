<!DOCTYPE HTML>
<html>
	<head>
		<style type="text/css">
			h1 {color:white; margin:3px;}
			h2 {color:orange;}
			background:black;
			input { width:30%; margin:auto; }
		</style>
	</head>
	<body style="background:black; font-family:sans; color:white; text-align:center;">
		<p id="networkAuthText"></p>
		<a id="networkAuthLink"></a>
		<div style="margin:auto; width:40%;">
		<h1>U S E R  N A M E</h1>
		<input id='loginUname' />
		<h1>P A S S W O R D</h1>
		<input id='loginPass' type='password' />
		<br/>
		<br/>
		<button style="border-radius:30px; border: 1px solid white;" onclick='attemptLogin()'>Login</button>
		<p id="loginStatus"></p>
		</div>

	<script src="commonFunctions.js"></script>
	<script>

		function handleWebSockDataType(datType, dat){
			if( datType.startsWith( "authErr" ) ){
				document.getElementById("loginStatus").innerText = "Invalid login";
				window.setTimeout( function(){
					document.getElementById("loginStatus").innerText = ""
				}, 1000);
			}
			else if( datType.startsWith( "auth" ) ){
				let authStr = td.decode(dat);
				storeAuthorization( authStr );
				getFile( finishUrlGoto, 'devSelection.html' );
			}
			
		}
		
		document.getElementById("loginPass").addEventListener("keydown",
			function(evt){
				if(evt.code === "Enter"){
					attemptLogin();
				}
			}
		);


		function attemptLogin(){
			let username = document.getElementById('loginUname').value;
			let password = document.getElementById('loginPass').value;
			sendCmds( [ ['loginUname', username], ['loginPass', password ] ] );
		}

		function storeAuthorization(auth){
			localStorage.setItem('authKey', auth);
		}
	</script>
	</body>
</html>
